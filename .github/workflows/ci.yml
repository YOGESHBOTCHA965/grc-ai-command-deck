name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          python -c "import pathlib, py_compile; [py_compile.compile(str(p), doraise=True) for p in pathlib.Path('.').glob('*.py')]"

      - name: App import smoke test
        run: |
          python -c "import app; print('app import ok')"

      - name: API route smoke test
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app import app

          client = TestClient(app)
          response = client.get('/')
          assert response.status_code == 200, response.text
          print('home route ok')
          PY

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t grc-ai-dashboard:ci .
