services:
  - type: web
    name: grc-ai-command-deck-app
    env: docker
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: GRC_ADMIN_USER
        sync: false
      - key: GRC_ADMIN_PASSWORD
        sync: false
      - key: GRC_ADMIN_ROLE
        value: admin
